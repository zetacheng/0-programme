name: Programme infrastructure checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install infrastructure dependencies
        run: python -m pip install --upgrade pip ".[dev]"

      - name: Run programme checks
        run: make check
